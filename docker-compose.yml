name: doc-hub

services:
  postgres:
    image: postgres:16-alpine
    container_name: doc-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: doc-hub
      POSTGRES_PASSWORD: doc-hub
      POSTGRES_DB: doc-hub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doc-hub -d doc-hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE: "/"
    image: doc-hub:latest
    container_name: doc-hub-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DOC_HUB_ADDR: ":8787"
      DOC_HUB_STORAGE: "/data/docs"
      DOC_HUB_WEB_ROOT: "/app/web"
      DOC_HUB_ORIGIN: "${DOC_HUB_ORIGIN:-http://localhost:8787,http://127.0.0.1:8787}"
      DOC_HUB_JWT_SECRET: "${DOC_HUB_JWT_SECRET:-change-this-internal-secret-before-sharing}"
      DOC_HUB_DISABLE_REGISTER: "${DOC_HUB_DISABLE_REGISTER:-0}"
      DOC_HUB_SHARE_TTL_HOURS: "${DOC_HUB_SHARE_TTL_HOURS:-720}"
      DOC_HUB_PG_HOST: "postgres"
      DOC_HUB_PG_PORT: "5432"
      DOC_HUB_PG_USER: "doc-hub"
      DOC_HUB_PG_PASSWORD: "doc-hub"
      DOC_HUB_PG_DB: "doc-hub"
      DOC_HUB_PG_SSLMODE: "disable"
    volumes:
      - docs:/data/docs
    ports:
      - "${DOC_HUB_BIND_ADDR:-127.0.0.1}:${DOC_HUB_PORT:-8787}:8787"

volumes:
  pgdata:
    name: doc-hub_pgdata
  docs:
    name: doc-hub_docs
