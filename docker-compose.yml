services:
  postgres:
    image: postgres:16-alpine
    container_name: web-doc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: webdoc
      POSTGRES_PASSWORD: webdoc
      POSTGRES_DB: webdoc
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webdoc -d webdoc"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 默认不暴露端口；如需本机连接调试，取消下方注释
    # ports:
    #   - "5432:5432"

  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 与 nginx 反代前缀保持一致；如直接挂在域名根下，改为 "/"。
        VITE_BASE: "/doc/"
    image: uswccr.ccs.tencentyun.com/xiaofeng/web-doc:latest
    container_name: web-doc-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      WEBDOC_ADDR: ":8787"
      WEBDOC_STORAGE: "/data/docs"
      WEBDOC_WEB_ROOT: "/app/web"
      WEBDOC_ORIGIN: "*"
      WEBDOC_PG_HOST: "postgres"
      WEBDOC_PG_PORT: "5432"
      WEBDOC_PG_USER: "webdoc"
      WEBDOC_PG_PASSWORD: "webdoc"
      WEBDOC_PG_DB: "webdoc"
      WEBDOC_PG_SSLMODE: "disable"
    volumes:
      - docs:/data/docs
    ports:
      - "8787:8787"

  nginx:
    image: nginx:1.27-alpine
    container_name: web-doc-nginx
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro

volumes:
  pgdata:
  docs:
